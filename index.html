<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicilan Laptop Lenovo LOQ Wahyu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💻 Cicilan Laptop Lenovo LOQ Wahyu</h1>

    <p class="subtitle">
        Pembayaran paling lambat setiap <b>tanggal 1</b>.
    </p>

    <div class="summary">

        <div class="card">
            <h3>Harga Laptop</h3>
            <p id="harga">Rp15.772.102</p>
        </div>

        <div class="card">
            <h3>Sudah Dibayar</h3>
            <p id="sudahBayar">Rp0</p>
        </div>

        <div class="card">
            <h3>Sisa Hutang</h3>
            <p id="sisaHutang">Rp15.772.102</p>
        </div>

    </div>

    <div class="progress-wrapper">

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <p id="progressText">

            0 / 16 Cicilan

        </p>

    </div>

    <h2>Daftar Cicilan</h2>

    <div id="daftarCicilan"></div>

    <h2>Foto Laptop</h2>

    <div class="gallery">

        <img src="images/hero.jpg">

        <img src="images/gallery1.jpg">

        <img src="images/gallery2.jpg">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
